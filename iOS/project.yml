name: GeneratorLog
options:
  bundleIdPrefix: com.shimondeitel.generatorlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  GeneratorLog:
    type: application
    platform: iOS
    sources:
      - path: GeneratorLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.generatorlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: GeneratorLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GeneratorLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GeneratorLogTests
      - path: GeneratorLog.storekit
    dependencies:
      - target: GeneratorLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.generatorlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GeneratorLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GeneratorLogUITests
    dependencies:
      - target: GeneratorLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.generatorlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  GeneratorLog:
    build:
      targets:
        GeneratorLog: all
        GeneratorLogTests: [test]
        GeneratorLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: GeneratorLog.storekit
    test:
      config: Debug
      storeKitConfiguration: GeneratorLog.storekit
      targets:
        - GeneratorLogTests
        - GeneratorLogUITests
    archive:
      config: Release
